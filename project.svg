  <text x="230" y="175" font-family="monospace" font-size="13" fill="#8b949e">→  GPS verification + Face Recognition (3-layer)</text>

  <text x="30" y="197" font-family="monospace" font-size="13" fill="#58a6ff">▸</text>
  <text x="50" y="197" font-family="monospace" font-size="13" fill="#e6edf3">AI Study Bot</text>
  <text x="230" y="197" font-family="monospace" font-size="13" fill="#8b949e">→  Syllabus-aware LLM via Groq API</text>

  <text x="30" y="219" font-family="monospace" font-size="13" fill="#58a6ff">▸</text>
  <text x="50" y="219" font-family="monospace" font-size="13" fill="#e6edf3">Fee Management</text>
  <text x="230" y="219" font-family="monospace" font-size="13" fill="#8b949e">→  UPI · NetBanking · PDF Receipts</text>

